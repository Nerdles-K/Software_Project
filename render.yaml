# Render Blueprint for the VisiTalk backend (Spring Boot, Dockerfile).
# Frontend is deployed separately on Vercel.
services:
  - type: web
    name: visitalk-api
    runtime: docker
    repo: https://github.com/Nerdles-K/Software_Project
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      # Supabase Session-pooler JDBC URL (set as secret in Render dashboard / API).
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      # Comma-separated frontend origins; updated with the Vercel URL after deploy.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JPA_SHOW_SQL
        value: "false"
      - key: LOG_LEVEL
        value: INFO
