server:
  port: 8080

spring:
  application:
    name: visitalk
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/visitalk}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET:placeholder-change-in-production}
    expiration-ms: 86400000

logging:
  level:
    com.visitalk: DEBUG
