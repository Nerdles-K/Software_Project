server:
  port: 8080

spring:
  application:
    name: visitalk
  datasource:
    url: jdbc:postgresql://localhost:5432/visitalk
    username: visitalk
    password: visitalk123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  jwt:
    secret: visitalk-dev-secret-key-change-in-production-at-least-256-bits
    expiration-ms: 86400000

logging:
  level:
    com.visitalk: DEBUG
