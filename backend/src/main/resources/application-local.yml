# In-memory DB for local A-1 testing when PostgreSQL is not running.
# Run: ./gradlew bootRun --args='--spring.profiles.active=local'
spring:
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:visitalk;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
